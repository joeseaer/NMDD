<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrepreneur Simulator</title>
  </head>
  <body>
    <div id="root">
      <div style="font-family: ui-sans-serif, system-ui; padding: 24px; color: #111827;">
        Loading…
      </div>
    </div>
    <script>
      (function () {
        var root = document.getElementById('root');
        window.__APP_BOOT_OK__ = false;
        var show = function (title, detail) {
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;background:#f9fafb;color:#111827;padding:24px;font-family:ui-sans-serif,system-ui">' +
            '<div style="max-width:760px;margin:0 auto;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px">' +
            '<div style="font-size:18px;font-weight:700">' + title + '</div>' +
            '<div style="font-size:13px;color:#4b5563;margin-top:8px">' + (detail || '') + '</div>' +
            '<div style="margin-top:14px;font-size:12px;color:#6b7280">当前地址：' + location.href + '</div>' +
            '</div></div>';
        };

        window.addEventListener('error', function (e) {
          var msg = (e && e.error && e.error.message) ? e.error.message : (e && e.message) ? e.message : 'Unknown error';
          show('页面启动失败', msg);
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          var msg = r && r.message ? r.message : String(r || 'Unknown error');
          show('页面启动失败', msg);
        });

        setTimeout(function () {
          if (window.__APP_BOOT_OK__) return;
          var hint = '';
          if (location.protocol === 'file:') {
            hint = '你正在用 file:// 直接打开页面，Vite/React 无法加载模块。请用 http://127.0.0.1:5173/ 访问。';
          } else {
            hint = '脚本未能启动或 API 未就绪。请确认：前端在 5173、后端在 3000，并打开浏览器控制台查看具体报错。';
          }
          show('一直卡在 Loading', hint);
        }, 2500);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
